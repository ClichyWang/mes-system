<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MES系统 - 工作流</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="sidebar">
        <h2>MES系统</h2>
        <ul>
            <li><a href="/">首页</a></li>
            <li><a href="/bom">BOM管理</a></li>
            <li><a href="/workorder">工单管理</a></li>
            <li><a href="/workflow" class="active">工作流</a></li>
            <li><a href="/production">生产采集</a></li>
            <li><a href="/wip">WIP报表</a></li>
        </ul>
    </div>
    <div class="main-content">
        <div class="header">
            <h1>工作流管理</h1>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3>工作流任务列表</h3>
                <button class="btn btn-primary" onclick="openModal()">新增任务</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>任务名称</th>
                        <th>任务编码</th>
                        <th>所属工单</th>
                        <th>负责人</th>
                        <th>状态</th>
                        <th>开始时间</th>
                        <th>结束时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="workflowTable">
                    <tr><td colspan="8" style="text-align:center">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>新增工作流任务</h3>
            <form id="workflowForm">
                <div class="form-group">
                    <label>所属工单</label>
                    <select id="work_order_id" required>
                        <option value="">请选择工单</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>任务名称</label>
                    <input type="text" id="task_name" required>
                </div>
                <div class="form-group">
                    <label>任务编码</label>
                    <input type="text" id="task_code" required>
                </div>
                <div class="form-group">
                    <label>负责人</label>
                    <input type="text" id="assignee" required>
                </div>
                <button type="submit" class="btn btn-success">保存</button>
            </form>
        </div>
    </div>
    <script>
        let workorders = [];

        async function loadWorkorders() {
            const res = await fetch('/api/workorder');
            workorders = await res.json();
            const select = document.getElementById('work_order_id');
            select.innerHTML = '<option value="">请选择工单</option>' +
                workorders.map(w => `<option value="${w.id}">${w.order_no} - ${w.product_name}</option>`).join('');
        }

        async function loadWorkflow() {
            await loadWorkorders();
            const res = await fetch('/api/workflow');
            const data = await res.json();
            const tbody = document.getElementById('workflowTable');
            tbody.innerHTML = data.map(item => {
                const wo = workorders.find(w => w.id === item.work_order_id);
                return `
                <tr>
                    <td>${item.task_name}</td>
                    <td>${item.task_code}</td>
                    <td>${wo ? wo.order_no : '-'}</td>
                    <td>${item.assignee}</td>
                    <td><span class="status-${item.status.replace(' ', '_')}">${getStatusText(item.status)}</span></td>
                    <td>${item.start_time ? new Date(item.start_time).toLocaleString() : '-'}</td>
                    <td>${item.end_time ? new Date(item.end_time).toLocaleString() : '-'}</td>
                    <td class="actions">
                        <button class="btn btn-warning" onclick="updateStatus(${item.id}, 'in_progress')">开始</button>
                        <button class="btn btn-success" onclick="updateStatus(${item.id}, 'completed')">完成</button>
                        <button class="btn btn-danger" onclick="deleteWorkflow(${item.id})">删除</button>
                    </td>
                </tr>
            `}).join('');
        }

        function getStatusText(status) {
            const map = { 'pending': '待处理', 'in_progress': '进行中', 'completed': '已完成', 'cancelled': '已取消' };
            return map[status] || status;
        }

        function openModal() {
            document.getElementById('modal').style.display = 'block';
            document.getElementById('workflowForm').reset();
            loadWorkorders();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        document.getElementById('workflowForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                work_order_id: parseInt(document.getElementById('work_order_id').value),
                task_name: document.getElementById('task_name').value,
                task_code: document.getElementById('task_code').value,
                assignee: document.getElementById('assignee').value
            };
            await fetch('/api/workflow', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            closeModal();
            loadWorkflow();
        });

        async function updateStatus(id, status) {
            await fetch(`/api/workflow/${id}/status?status=${status}`, { method: 'PUT' });
            loadWorkflow();
        }

        async function deleteWorkflow(id) {
            if (confirm('确定要删除这个任务吗？')) {
                await fetch(`/api/workflow/${id}`, { method: 'DELETE' });
                loadWorkflow();
            }
        }

        loadWorkflow();
    </script>
</body>
</html>
